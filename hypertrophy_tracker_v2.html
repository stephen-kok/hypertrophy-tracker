/* ━━━ STORAGE HELPERS ━━━ */
const LS="ht2_";
function lsGet(k){try{const v=localStorage.getItem(LS+k);return v?JSON.parse(v):null}catch(e){return null}}
function lsSet(k,v){try{localStorage.setItem(LS+k,JSON.stringify(v))}catch(e){}}
const today=()=>new Date().toISOString().slice(0,10);
const fmtTime=s=>{const m=Math.floor(s/60),sec=s%60;return m+":"+String(sec).padStart(2,"0")};
const fmtElapsed=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return h>0?h+"h "+m+"m":m>0?m+"m "+String(sec).padStart(2,"0")+"s":sec+"s"};

/* Get the data key for a day+date */
const dataKey=(dayId,date)=>dayId+"@"+date;

/* Get all historical dates for a given day */
function getHistory(dayId,exName,limit){
  const results=[];
  const prefix=LS+dayId+"@";
  for(let i=0;i<localStorage.length&&results.length<limit;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith(prefix)){
      const date=k.slice(prefix.length);
      if(date===today()) continue;
      try{
        const data=JSON.parse(localStorage.getItem(k));
        if(data&&data.exercises&&data.exercises[exName]){
          results.push({date,sets:data.exercises[exName]});
        }
      }catch(e){}
    }
  }
  results.sort((a,b)=>b.date.localeCompare(a.date));
  return results.slice(0,limit);
}

/* Get machine base weight */
function getMachineWeight(exName){return lsGet("mw_"+exName)||0}
function setMachineWeight(exName,w){lsSet("mw_"+exName,w)}

/* ━━━ SESSION TIMER (global) ━━━ */
let sessionStart=lsGet("session_"+today());
function markSessionStart(){
  if(!sessionStart){sessionStart=Date.now();lsSet("session_"+today(),sessionStart)}
}

/* ━━━ SAVE/LOAD DAY DATA ━━━ */
function loadDayData(dayId){
  return lsGet(dataKey(dayId,today()))||{exercises:{},startedAt:null};
}
function saveDayData(dayId,data){
  lsSet(dataKey(dayId,today()),data);
}

/* ━━━ REST TIMER ━━━ */
/* Bug fix: timer state is managed globally so collapsing a card doesn't kill it */
const activeTimers={};

function RestTimer({exKey,defaultSeconds}){
  const[total,setTotal]=useState(()=>{
    const t=activeTimers[exKey];
    return t?t.total:defaultSeconds;
  });
  const[remaining,setRemaining]=useState(()=>{
    const t=activeTimers[exKey];
    if(t&&t.running){return Math.max(0,t.total-Math.floor((Date.now()-t.startedAt)/1000))}
    if(t&&t.done) return 0;
    return null;
  });
  const[running,setRunning]=useState(()=>{
    const t=activeTimers[exKey];
    return t?t.running:false;
  });
  const[done,setDone]=useState(()=>{
    const t=activeTimers[exKey];
    return t?t.done:false;
  });
  const intervalRef=useRef(null);
  const totalRef=useRef(total);

  const clearInt=useCallback(()=>{if(intervalRef.current){clearInterval(intervalRef.current);intervalRef.current=null}},[]);

  /* Sync to global timer on mount (re-expand card) */
  useEffect(()=>{
    const t=activeTimers[exKey];
    if(t&&t.running){
      setRunning(true);setDone(false);setTotal(t.total);totalRef.current=t.total;
      intervalRef.current=setInterval(()=>{
        const left=Math.max(0,t.total-Math.floor((Date.now()-t.startedAt)/1000));
        setRemaining(left);
        if(left===0){clearInterval(intervalRef.current);intervalRef.current=null;setRunning(false);setDone(true);t.running=false;t.done=true;if(navigator.vibrate)navigator.vibrate([200,100,200])}
      },250);
    }
    return()=>clearInt();
  },[exKey,clearInt]);

  const start=useCallback(()=>{
    clearInt();const now=Date.now();
    activeTimers[exKey]={total:totalRef.current,startedAt:now,running:true,done:false};
    setDone(false);setRemaining(totalRef.current);setRunning(true);
    intervalRef.current=setInterval(()=>{
      const left=Math.max(0,totalRef.current-Math.floor((Date.now()-now)/1000));
      setRemaining(left);
      if(left===0){clearInterval(intervalRef.current);intervalRef.current=null;setRunning(false);setDone(true);activeTimers[exKey].running=false;activeTimers[exKey].done=true;if(navigator.vibrate)navigator.vibrate([200,100,200])}
    },250);
  },[exKey,clearInt]);

  const stop=useCallback(()=>{
    clearInt();setRunning(false);setRemaining(null);setDone(false);
    activeTimers[exKey]={total:totalRef.current,startedAt:null,running:false,done:false};
  },[exKey,clearInt]);

  useEffect(()=>{totalRef.current=total},[total]);

  const progress=running&&remaining!==null?remaining/total:done?0:1;
  const display=remaining!==null?remaining:total;
  const color=done?"#22c55e":running?"#f59e0b":"#4b5563";
  const presets=[45,60,90,120,150];

  return h("div",{style:{display:"flex",alignItems:"center",gap:12,padding:"10px 0"}},
    h("div",{style:{position:"relative",width:52,height:52,flexShrink:0}},
      h("svg",{width:52,height:52,style:{transform:"rotate(-90deg)"}},
        h("circle",{cx:26,cy:26,r:22,fill:"none",stroke:"rgba(255,255,255,0.05)",strokeWidth:3.5}),
        h("circle",{cx:26,cy:26,r:22,fill:"none",stroke:color,strokeWidth:3.5,strokeDasharray:2*Math.PI*22,strokeDashoffset:2*Math.PI*22*(1-progress),strokeLinecap:"round",style:{transition:"stroke-dashoffset 0.3s"}}),
      ),
      h("div",{style:{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,fontVariantNumeric:"tabular-nums",color:done?"#22c55e":"#e5e7eb"}},fmtTime(display)),
    ),
    h("div",{style:{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}},
      !running
        ?h("button",{onClick:start,style:{padding:"6px 14px",borderRadius:8,border:"none",background:done?"#22c55e":"#f59e0b",color:"#000",fontSize:12,fontWeight:700,cursor:"pointer"}},done?"Restart":"Start")
        :h("button",{onClick:stop,style:{padding:"6px 14px",borderRadius:8,border:"none",background:"#ef4444",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}},"Stop"),
      h("div",{style:{display:"flex",gap:3}},
        presets.map(s=>h("button",{key:s,onClick:()=>{setTotal(s);totalRef.current=s;if(!running){setRemaining(null);setDone(false);activeTimers[exKey]={total:s,startedAt:null,running:false,done:false}}},
          style:{padding:"3px 7px",borderRadius:5,fontSize:10,fontWeight:600,cursor:"pointer",background:total===s?"rgba(245,158,11,0.18)":"rgba(255,255,255,0.04)",color:total===s?"#f59e0b":"#6b7280",border:total===s?"1px solid rgba(245,158,11,0.3)":"1px solid rgba(255,255,255,0.07)"}
        },s<60?s+"s":(s/60|0)+(s%60?":"+(s%60+"").padStart(2,"0"):"m")))
      )
    )
  );
}

/* ━━━ HISTORY PANEL ━━━ */
function HistoryPanel({dayId,exName}){
  const hist=useMemo(()=>getHistory(dayId,exName,3),[dayId,exName]);
  if(!hist.length)return h("div",{style:{fontSize:11,color:"#3f3f46",fontStyle:"italic",padding:"6px 0"}},"No previous sessions logged yet.");

  return h("div",{className:"fade-in",style:{marginTop:6}},
    hist.map(entry=>{
      const d=new Date(entry.date+"T12:00:00");
      const label=d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
      return h("div",{key:entry.date,style:{display:"flex",alignItems:"center",gap:8,padding:"4px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}},
        h("span",{style:{fontSize:10,fontWeight:700,color:"#4b5563",width:44,flexShrink:0}},label),
        h("div",{style:{display:"flex",gap:6,flex:1,overflow:"auto"}},
          entry.sets.map((s,i)=>s.weight||s.reps?h("span",{key:i,style:{fontSize:10,color:s.done?"#6b7280":"#4b5563",fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap"}},
            (s.weight||"—")+"×"+(s.reps||"—")
          ):null).filter(Boolean)
        )
      );
    })
  );
}

/* ━━━ MACHINE WEIGHT ━━━ */
function MachineWeightInput({exName}){
  const[show,setShow]=useState(false);
  const[weight,setWeight]=useState(()=>getMachineWeight(exName));

  const save=useCallback(v=>{
    const num=Math.max(0,parseFloat(v)||0);
    setWeight(num);setMachineWeight(exName,num);
  },[exName]);

  return h("div",{style:{padding:"4px 0"}},
    h("button",{onClick:()=>setShow(!show),style:{fontSize:11,color:"#6b7280",background:"none",border:"none",cursor:"pointer",padding:"2px 0",textDecoration:"underline",textDecorationColor:"rgba(107,114,128,0.3)",textUnderlineOffset:2}},
      weight>0?"Machine base: "+weight+" lbs ✎":"+ Set machine base weight"
    ),
    show&&h("div",{className:"fade-in",style:{display:"flex",alignItems:"center",gap:8,marginTop:6}},
      h("input",{type:"number",inputMode:"decimal",value:weight||"",placeholder:"0",onChange:e=>save(e.target.value),style:{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"6px 8px",color:"#e5e7eb",fontSize:13,fontWeight:600,textAlign:"center",width:70,outline:"none"}}),
      h("span",{style:{fontSize:11,color:"#6b7280"}},"lbs (machine stack starting weight)"),
    )
  );
}

/* ━━━ SET LOGGER ━━━ */
function SetLogger({exName,numSets,dayId,onSetUpdate}){
  const[data,setData]=useState(()=>{
    const saved=loadDayData(dayId);
    const ex=saved.exercises&&saved.exercises[exName];
    return Array.from({length:numSets},(_,i)=>ex&&ex[i]?{weight:ex[i].weight||"",reps:ex[i].reps||"",done:!!ex[i].done}:{weight:"",reps:"",done:false});
  });

  /* Get last session for ghost values */
  const lastSession=useMemo(()=>{
    const h=getHistory(dayId,exName,1);
    return h.length?h[0].sets:null;
  },[dayId,exName]);

  const persist=useCallback(d=>{
    const all=loadDayData(dayId);
    if(!all.exercises)all.exercises={};
    all.exercises[exName]=d;
    saveDayData(dayId,all);
    markSessionStart();
    if(onSetUpdate)onSetUpdate();
  },[dayId,exName,onSetUpdate]);

  const update=(idx,field,val)=>{
    /* Input validation: only allow valid numeric input */
    if(val!==""&&(isNaN(Number(val))||Number(val)<0))return;
    setData(prev=>{const next=prev.map((s,i)=>i===idx?{...s,[field]:val}:s);persist(next);return next});
  };

  const toggle=idx=>{
    setData(prev=>{const next=prev.map((s,i)=>i===idx?{...s,done:!s.done}:s);persist(next);return next});
  };

  /* Tap last session value to auto-fill */
  const autoFill=(idx,field)=>{
    if(lastSession&&lastSession[idx]&&lastSession[idx][field]){
      update(idx,field,lastSession[idx][field]);
    }
  };

  const iStyle={background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"9px 4px",color:"#e5e7eb",fontSize:14,fontWeight:600,textAlign:"center",outline:"none",width:"100%",boxSizing:"border-box",fontVariantNumeric:"tabular-nums"};

  return h("div",{style:{marginTop:8}},
    h("div",{style:{display:"grid",gridTemplateColumns:"28px 1fr 1fr 36px",gap:5,marginBottom:6}},
      h("span",{style:{fontSize:9,color:"#4b5563",textAlign:"center",fontWeight:700}},"SET"),
      h("span",{style:{fontSize:9,color:"#4b5563",textAlign:"center",fontWeight:700}},"LBS"),
      h("span",{style:{fontSize:9,color:"#4b5563",textAlign:"center",fontWeight:700}},"REPS"),
      h("span",null),
    ),
    data.map((set,i)=>{
      const ghost=lastSession&&lastSession[i];
      return h("div",{key:i,style:{display:"grid",gridTemplateColumns:"28px 1fr 1fr 36px",gap:5,alignItems:"center",marginBottom:4}},
        h("span",{style:{fontSize:12,color:"#4b5563",textAlign:"center",fontWeight:700}},i+1),
        h("div",{style:{position:"relative"}},
          h("input",{type:"number",inputMode:"decimal",placeholder:ghost&&ghost.weight?String(ghost.weight):"—",value:set.weight,onChange:e=>update(i,"weight",e.target.value),onFocus:()=>{if(!set.weight&&ghost&&ghost.weight)autoFill(i,"weight")},style:{...iStyle,opacity:set.done?.4:1}}),
        ),
        h("div",{style:{position:"relative"}},
          h("input",{type:"number",inputMode:"numeric",placeholder:ghost&&ghost.reps?String(ghost.reps):"—",value:set.reps,onChange:e=>update(i,"reps",e.target.value),onFocus:()=>{if(!set.reps&&ghost&&ghost.reps)autoFill(i,"reps")},style:{...iStyle,opacity:set.done?.4:1}}),
        ),
        h("button",{onClick:()=>toggle(i),style:{width:32,height:32,borderRadius:7,border:set.done?"2px solid #22c55e":"2px solid rgba(255,255,255,0.08)",background:set.done?"rgba(34,197,94,0.15)":"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:set.done?"#22c55e":"#3f3f46"}},set.done?"✓":""),
      );
    }),
  );
}

/* ━━━ EXERCISE CARD ━━━ */
function ExerciseCard({exercise,index,dayId,onSetUpdate}){
  const[expanded,setExpanded]=useState(false);
  const[showTip,setShowTip]=useState(false);
  const[showHistory,setShowHistory]=useState(false);
  const exKey=dayId+"_"+exercise.name;

  /* Check completion from storage */
  const saved=loadDayData(dayId);
  const exData=saved.exercises&&saved.exercises[exercise.name];
  const completedSets=exData?exData.filter(s=>s.done).length:0;
  const allDone=completedSets===exercise.sets;

  /* Check if timer is running for this exercise */
  const timerState=activeTimers[exKey];
  const timerRunning=timerState&&timerState.running;

  const restLabel=exercise.rest<60?exercise.rest+"s":(exercise.rest/60|0)+(exercise.rest%60?":"+(exercise.rest%60+"").padStart(2,"0"):"m");

  return h("div",{style:{background:allDone?"rgba(34,197,94,0.04)":"rgba(255,255,255,0.025)",borderRadius:14,border:allDone?"1px solid rgba(34,197,94,0.15)":"1px solid rgba(255,255,255,0.055)",padding:"12px 14px",marginBottom:8,transition:"all 0.2s"}},
    h("div",{onClick:()=>setExpanded(!expanded),style:{cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,WebkitUserSelect:"none",userSelect:"none"}},
      h("div",{style:{flex:1}},
        h("div",{style:{display:"flex",alignItems:"center",gap:8}},
          h("span",{style:{fontSize:10,fontWeight:800,color:allDone?"#22c55e":"#f59e0b",background:allDone?"rgba(34,197,94,0.1)":"rgba(245,158,11,0.1)",padding:"2px 6px",borderRadius:4,letterSpacing:.4,lineHeight:"16px"}},index+1),
          h("span",{style:{fontSize:14,fontWeight:700,color:allDone?"#6b7280":"#f1f5f9",lineHeight:1.3,textDecoration:allDone?"line-through":"none",textDecorationColor:"rgba(107,114,128,0.4)"}},exercise.name),
          timerRunning&&!expanded?h("span",{className:"timer-active",style:{width:6,height:6,borderRadius:3,background:"#f59e0b",marginLeft:2}}):null,
        ),
        h("div",{style:{display:"flex",alignItems:"center",gap:6,marginTop:3}},
          h("span",{style:{fontSize:11,color:"#6b7280"}},exercise.sets+"×"+exercise.reps+" · "+restLabel),
          completedSets>0?h("span",{style:{fontSize:10,fontWeight:700,color:allDone?"#22c55e":"#f59e0b",background:allDone?"rgba(34,197,94,0.1)":"rgba(245,158,11,0.08)",padding:"1px 5px",borderRadius:4}},completedSets+"/"+exercise.sets):null,
        ),
        !expanded?h("div",{style:{fontSize:11,color:"#4b5563",marginTop:2,fontStyle:"italic",lineHeight:1.3}},exercise.notes):null,
      ),
      h("span",{style:{fontSize:16,color:"#3f3f46",transform:expanded?"rotate(180deg)":"rotate(0deg)",transition:"transform 0.2s",marginTop:2,flexShrink:0}},"\u25BE"),
    ),
    expanded&&h("div",{className:"fade-in",style:{marginTop:10,borderTop:"1px solid rgba(255,255,255,0.04)",paddingTop:10}},
      h("div",{style:{fontSize:12,color:"#6b7280",fontStyle:"italic",marginBottom:8}},exercise.notes),
      exercise.machine?h(MachineWeightInput,{exName:exercise.name}):null,
      h(SetLogger,{exName:exercise.name,numSets:exercise.sets,dayId:dayId,onSetUpdate}),
      h(RestTimer,{exKey,defaultSeconds:exercise.rest}),
      h("div",{style:{display:"flex",gap:6,marginTop:8}},
        h("button",{onClick:()=>{setShowHistory(!showHistory);if(showTip)setShowTip(false)},style:{flex:1,padding:"7px 10px",borderRadius:8,border:"1px solid rgba(99,102,241,0.2)",background:showHistory?"rgba(99,102,241,0.08)":"transparent",color:"#818cf8",fontSize:11,fontWeight:600,cursor:"pointer"}},(showHistory?"Hide":"Show")+" History"),
        h("button",{onClick:()=>{setShowTip(!showTip);if(showHistory)setShowHistory(false)},style:{flex:1,padding:"7px 10px",borderRadius:8,border:"1px solid rgba(245,158,11,0.2)",background:showTip?"rgba(245,158,11,0.08)":"transparent",color:"#f59e0b",fontSize:11,fontWeight:600,cursor:"pointer"}},(showTip?"Hide":"Show")+" Coaching Tip"),
      ),
      showHistory&&h(HistoryPanel,{dayId,exName:exercise.name}),
      showTip&&h("div",{className:"fade-in",style:{marginTop:8,padding:12,borderRadius:10,background:"rgba(245,158,11,0.04)",border:"1px solid rgba(245,158,11,0.1)",fontSize:12,color:"#d1d5db",lineHeight:1.65}},exercise.tip),
    ),
  );
}

/* ━━━ DAY VIEW ━━━ */
function DayView({day,refresh}){
  const saved=loadDayData(day.id);
  const totalSets=day.exercises.reduce((a,e)=>a+e.sets,0);
  const doneSets=day.exercises.reduce((a,e)=>{
    const d=saved.exercises&&saved.exercises[e.name];
    return a+(d?d.filter(s=>s.done).length:0);
  },0);
  const pct=totalSets>0?doneSets/totalSets:0;

  return h("div",{style:{paddingBottom:40}},
    h("div",{style:{marginBottom:14}},
      h("h2",{style:{fontSize:18,fontWeight:800,margin:0,color:"#f1f5f9",letterSpacing:-.3}},day.title),
      h("p",{style:{fontSize:12,color:"#6b7280",margin:"3px 0 0",fontStyle:"italic"}},day.subtitle),
      /* Progress bar */
      h("div",{style:{marginTop:10,display:"flex",alignItems:"center",gap:10}},
        h("div",{style:{flex:1,height:4,borderRadius:2,background:"rgba(255,255,255,0.06)",overflow:"hidden"}},
          h("div",{style:{width:(pct*100)+"%",height:"100%",borderRadius:2,background:pct>=1?"#22c55e":"#f59e0b",transition:"width 0.3s ease"}}),
        ),
        h("span",{style:{fontSize:11,fontWeight:700,color:pct>=1?"#22c55e":"#9ca3af",fontVariantNumeric:"tabular-nums",flexShrink:0}},doneSets+"/"+totalSets+" sets"),
      ),
    ),
    day.exercises.map((ex,i)=>h(ExerciseCard,{key:ex.name,exercise:ex,index:i,dayId:day.id,onSetUpdate:refresh})),
  );
}

/* ━━━ SESSION TIMER DISPLAY ━━━ */
function SessionTimer(){
  const[elapsed,setElapsed]=useState(0);
  const started=lsGet("session_"+today());

  useEffect(()=>{
    if(!started)return;
    const tick=()=>setElapsed(Math.floor((Date.now()-started)/1000));
    tick();
    const id=setInterval(tick,1000);
    return()=>clearInterval(id);
  },[started]);

  if(!started)return h("span",{style:{fontSize:11,color:"#3f3f46"}},"Not started");
  return h("span",{style:{fontSize:12,fontWeight:700,color:"#f59e0b",fontVariantNumeric:"tabular-nums"}},fmtElapsed(elapsed));
}

/* ━━━ APP ━━━ */
function App(){
  const[activeDay,setActiveDay]=useState(0);
  const[,setTick]=useState(0);
  const scrollRef=useRef(null);
  const refresh=useCallback(()=>setTick(t=>t+1),[]);

  useEffect(()=>{
    const dow=new Date().getDay();
    const map={1:0,2:1,4:2,5:3,6:4};
    if(map[dow]!==undefined)setActiveDay(map[dow]);
  },[]);

  useEffect(()=>{if(scrollRef.current)scrollRef.current.scrollTop=0},[activeDay]);

  return h("div",{style:{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}},
    /* ━ Header ━ */
    h("div",{style:{paddingTop:"max(env(safe-area-inset-top, 0px), 12px)",paddingLeft:16,paddingRight:16,paddingBottom:10,borderBottom:"1px solid rgba(255,255,255,0.06)",background:"rgba(10,10,15,0.97)",flexShrink:0,backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}},
        h("div",null,
          h("h1",{style:{fontSize:20,fontWeight:800,margin:0,letterSpacing:-.5,color:"#f1f5f9"}},"HYPER",h("span",{style:{color:"#f59e0b"}},"TROPHY")),
          h("div",{style:{fontSize:9,color:"#3f3f46",fontWeight:700,letterSpacing:1.5,marginTop:2}},"UPPER · LOWER · PUSH · PULL · LEGS"),
        ),
        h("div",{style:{textAlign:"right"}},
          h("div",{style:{fontSize:11,color:"#6b7280"}},new Date().toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"})),
          h("div",{style:{display:"flex",alignItems:"center",gap:4,justifyContent:"flex-end",marginTop:3}},
            h("span",{style:{fontSize:10,color:"#4b5563"}},"Session:"),
            h(SessionTimer,null),
          ),
        ),
      ),
      /* Tabs */
      h("div",{style:{display:"flex",gap:3}},
        DAYS.map((day,i)=>{
          const saved=loadDayData(day.id);
          const doneSets=day.exercises.reduce((a,e)=>{const d=saved.exercises&&saved.exercises[e.name];return a+(d?d.filter(s=>s.done).length:0)},0);
          const totalSets=day.exercises.reduce((a,e)=>a+e.sets,0);
          const hasProg=doneSets>0;
          const complete=doneSets===totalSets;
          return h("button",{key:day.id,onClick:()=>setActiveDay(i),
            style:{flex:1,padding:"7px 2px 6px",borderRadius:9,border:activeDay===i?"1px solid rgba(245,158,11,0.4)":complete?"1px solid rgba(34,197,94,0.2)":"1px solid rgba(255,255,255,0.04)",background:activeDay===i?"rgba(245,158,11,0.1)":complete?"rgba(34,197,94,0.04)":"rgba(255,255,255,0.02)",cursor:"pointer",textAlign:"center",transition:"all 0.15s",position:"relative"}
          },
            h("div",{style:{fontSize:9,fontWeight:700,color:activeDay===i?"#f59e0b":complete?"#22c55e":"#4b5563",letterSpacing:.4}},day.day),
            h("div",{style:{fontSize:11,fontWeight:700,color:activeDay===i?"#f1f5f9":complete?"#6b7280":"#6b7280",marginTop:1}},day.label),
            hasProg&&!complete?h("div",{style:{width:4,height:4,borderRadius:2,background:"#f59e0b",margin:"3px auto 0"}}):null,
            complete?h("div",{style:{width:4,height:4,borderRadius:2,background:"#22c55e",margin:"3px auto 0"}}):null,
          );
        })
      ),
    ),
    /* ━ Content ━ */
    h("div",{ref:scrollRef,style:{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",paddingTop:16,paddingLeft:16,paddingRight:16,paddingBottom:"max(env(safe-area-inset-bottom, 0px), 20px)"}},
      h(DayView,{key:activeDay,day:DAYS[activeDay],refresh}),
    ),
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
