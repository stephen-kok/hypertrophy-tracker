/* ══════════════════════════════════════════
   STORAGE
   ══════════════════════════════════════════ */
var LS="ht3_";
function lsGet(k){try{var v=localStorage.getItem(LS+k);return v?JSON.parse(v):null}catch(e){return null}}
function lsSet(k,v){try{localStorage.setItem(LS+k,JSON.stringify(v))}catch(e){}}
var today=function(){return new Date().toISOString().slice(0,10)};
var fmtTime=function(s){return Math.floor(s/60)+":"+String(s%60).padStart(2,"0")};
var fmtElapsed=function(s){var hr=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return hr>0?hr+"h "+m+"m":m>0?m+"m "+String(sec).padStart(2,"0")+"s":sec+"s"};

/* Data key for a day+date */
var dataKey=function(dayId,date){return dayId+"@"+date};

/* Load/save day data */
function loadDayData(dayId,date){return lsGet(dataKey(dayId,date||today()))||{exercises:{},warmups:{}}}
function saveDayData(dayId,data){lsSet(dataKey(dayId,today()),data)}

/* Get history for exercise */
function getHistory(dayId,exId,limit){
  var results=[],prefix=LS+dayId+"@";
  for(var i=0;i<localStorage.length&&results.length<(limit||5);i++){
    var k=localStorage.key(i);
    if(k&&k.startsWith(prefix)){
      var date=k.slice(prefix.length);
      if(date===today())continue;
      try{
        var data=JSON.parse(localStorage.getItem(k));
        if(data&&data.exercises&&data.exercises[exId]){
          results.push({date:date,sets:data.exercises[exId]});
        }
      }catch(e){}
    }
  }
  results.sort(function(a,b){return b.date.localeCompare(a.date)});
  return results.slice(0,limit||5);
}

/* Machine base weight */
function getMachineWeight(exId){return lsGet("mw_"+exId)||0}
function setMachineWeight(exId,w){lsSet("mw_"+exId,w)}

/* Session timer */
function getSessionStart(){return lsGet("session_"+today())}
function markSessionStart(){if(!getSessionStart()){lsSet("session_"+today(),Date.now())}}

/* ══════════════════════════════════════════
   PROGRESSIVE OVERLOAD DETECTION
   ══════════════════════════════════════════ */
function parseRepRange(reps){
  var str=String(reps).replace(/\/leg/i,"");
  var parts=str.split("-");
  if(parts.length===2)return{min:parseInt(parts[0])||0,max:parseInt(parts[1])||0};
  var n=parseInt(str)||0;
  return{min:n,max:n};
}

function getOverloadSuggestion(dayId,exercise){
  var hist=getHistory(dayId,exercise.id,1);
  if(!hist.length)return null;
  var lastSets=hist[0].sets;
  if(!lastSets||!lastSets.length)return null;
  var range=parseRepRange(exercise.reps);
  if(range.max===0)return null;
  /* Check if all completed sets hit the top of the rep range */
  var completedSets=lastSets.filter(function(s){return s.done&&s.weight&&s.reps});
  if(completedSets.length<exercise.sets)return null;
  var allAtTop=completedSets.every(function(s){return parseInt(s.reps)>=range.max});
  if(!allAtTop)return null;
  var lastWeight=parseFloat(completedSets[0].weight)||0;
  if(lastWeight===0)return null;
  var inc=exercise.increment||(exercise.machine?5:5);
  return{from:lastWeight,to:lastWeight+inc,increment:inc};
}

/* ══════════════════════════════════════════
   DATA EXPORT / IMPORT
   ══════════════════════════════════════════ */
function exportData(){
  var data={},prefix=LS;
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    if(k&&k.startsWith(prefix)){
      try{data[k]=JSON.parse(localStorage.getItem(k))}catch(e){data[k]=localStorage.getItem(k)}
    }
  }
  var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download="hypertrophy_backup_"+today()+".json";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importData(file,onDone){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      var count=0;
      Object.keys(data).forEach(function(k){
        localStorage.setItem(k,typeof data[k]==="string"?data[k]:JSON.stringify(data[k]));
        count++;
      });
      if(onDone)onDone(count,null);
    }catch(err){if(onDone)onDone(0,err)}
  };
  reader.readAsText(file);
}

/* ══════════════════════════════════════════
   GLOBAL TIMER STATE
   ══════════════════════════════════════════ */
var activeTimers={};

/* Timer resilience: recalculate on screen wake */
document.addEventListener("visibilitychange",function(){
  if(document.visibilityState==="visible"){
    Object.keys(activeTimers).forEach(function(key){
      var t=activeTimers[key];
      if(t&&t.running&&t.startedAt){
        var elapsed=Math.floor((Date.now()-t.startedAt)/1000);
        if(elapsed>=t.total){t.running=false;t.done=true;if(navigator.vibrate)navigator.vibrate([200,100,200])}
      }
    });
  }
});

/* ══════════════════════════════════════════
   COMPONENTS
   ══════════════════════════════════════════ */

/* ── Rest Timer ── */
function RestTimer(props){
  var exKey=props.exKey,defaultSeconds=props.defaultSeconds,autoStart=props.autoStart;
  var s=useState(function(){var t=activeTimers[exKey];return t?t.total:defaultSeconds});
  var total=s[0],setTotal=s[1];
  var s2=useState(function(){var t=activeTimers[exKey];if(t&&t.running)return Math.max(0,t.total-Math.floor((Date.now()-t.startedAt)/1000));if(t&&t.done)return 0;return null});
  var remaining=s2[0],setRemaining=s2[1];
  var s3=useState(function(){var t=activeTimers[exKey];return t?t.running:false});
  var running=s3[0],setRunning=s3[1];
  var s4=useState(function(){var t=activeTimers[exKey];return t?!!t.done:false});
  var done=s4[0],setDone=s4[1];
  var intervalRef=useRef(null);
  var totalRef=useRef(total);
  var startedRef=useRef(false);

  var clearInt=useCallback(function(){if(intervalRef.current){clearInterval(intervalRef.current);intervalRef.current=null}},[]);

  var startFn=useCallback(function(){
    clearInt();var now=Date.now();
    activeTimers[exKey]={total:totalRef.current,startedAt:now,running:true,done:false};
    setDone(false);setRemaining(totalRef.current);setRunning(true);
    intervalRef.current=setInterval(function(){
      var left=Math.max(0,totalRef.current-Math.floor((Date.now()-now)/1000));
      setRemaining(left);
      if(left===0){clearInterval(intervalRef.current);intervalRef.current=null;setRunning(false);setDone(true);activeTimers[exKey].running=false;activeTimers[exKey].done=true;if(navigator.vibrate)navigator.vibrate([200,100,200])}
    },250);
  },[exKey,clearInt]);

  var stopFn=useCallback(function(){
    clearInt();setRunning(false);setRemaining(null);setDone(false);
    activeTimers[exKey]={total:totalRef.current,startedAt:null,running:false,done:false};
  },[exKey,clearInt]);

  /* Sync on mount */
  useEffect(function(){
    var t=activeTimers[exKey];
    if(t&&t.running){
      setRunning(true);setDone(false);setTotal(t.total);totalRef.current=t.total;
      var start=t.startedAt;
      intervalRef.current=setInterval(function(){
        var left=Math.max(0,t.total-Math.floor((Date.now()-start)/1000));
        setRemaining(left);
        if(left===0){clearInterval(intervalRef.current);intervalRef.current=null;setRunning(false);setDone(true);t.running=false;t.done=true;if(navigator.vibrate)navigator.vibrate([200,100,200])}
      },250);
    }
    return function(){clearInt()};
  },[exKey,clearInt]);

  /* Auto-start from quick log */
  useEffect(function(){
    if(autoStart&&!startedRef.current&&!running){startedRef.current=true;startFn()}
  },[autoStart,running,startFn]);

  useEffect(function(){totalRef.current=total},[total]);

  var progress=running&&remaining!==null?remaining/total:done?0:1;
  var display=remaining!==null?remaining:total;
  var color=done?"#22c55e":running?"#f59e0b":"#4b5563";
  var presets=[45,60,90,120,150];

  return h("div",{style:{display:"flex",alignItems:"center",gap:10,padding:"8px 0"}},
    h("div",{style:{position:"relative",width:48,height:48,flexShrink:0}},
      h("svg",{width:48,height:48,style:{transform:"rotate(-90deg)"}},
        h("circle",{cx:24,cy:24,r:20,fill:"none",stroke:"rgba(255,255,255,0.05)",strokeWidth:3}),
        h("circle",{cx:24,cy:24,r:20,fill:"none",stroke:color,strokeWidth:3,strokeDasharray:2*Math.PI*20,strokeDashoffset:2*Math.PI*20*(1-progress),strokeLinecap:"round",style:{transition:"stroke-dashoffset 0.3s"}})),
      h("div",{style:{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,fontVariantNumeric:"tabular-nums",color:done?"#22c55e":"#e5e7eb"}},fmtTime(display))),
    h("div",{style:{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}},
      !running
        ?h("button",{onClick:startFn,style:{padding:"5px 12px",borderRadius:7,border:"none",background:done?"#22c55e":"#f59e0b",color:"#000",fontSize:11,fontWeight:700,cursor:"pointer"}},done?"Restart":"Start")
        :h("button",{onClick:stopFn,style:{padding:"5px 12px",borderRadius:7,border:"none",background:"#ef4444",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}},"Stop"),
      h("div",{style:{display:"flex",gap:3}},
        presets.map(function(sec){return h("button",{key:sec,onClick:function(){setTotal(sec);totalRef.current=sec;if(!running){setRemaining(null);setDone(false);activeTimers[exKey]={total:sec,startedAt:null,running:false,done:false}}},
          style:{padding:"3px 6px",borderRadius:5,fontSize:10,fontWeight:600,cursor:"pointer",background:total===sec?"rgba(245,158,11,0.18)":"rgba(255,255,255,0.04)",color:total===sec?"#f59e0b":"#6b7280",border:total===sec?"1px solid rgba(245,158,11,0.3)":"1px solid rgba(255,255,255,0.07)"}
        },sec<60?sec+"s":(sec/60|0)+(sec%60?":"+(sec%60+"").padStart(2,"0"):"m"))}))))
}

/* ── History Panel ── */
function HistoryPanel(props){
  var dayId=props.dayId,exId=props.exId;
  var hist=useMemo(function(){return getHistory(dayId,exId,5)},[dayId,exId]);
  if(!hist.length)return h("div",{style:{fontSize:11,color:"#3f3f46",fontStyle:"italic",padding:"6px 0"}},"No previous sessions logged yet.");
  return h("div",{className:"fade-in",style:{marginTop:6}},
    hist.map(function(entry){
      var d=new Date(entry.date+"T12:00:00");
      var label=d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
      return h("div",{key:entry.date,style:{display:"flex",alignItems:"center",gap:8,padding:"4px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}},
        h("span",{style:{fontSize:10,fontWeight:700,color:"#4b5563",width:44,flexShrink:0}},label),
        h("div",{style:{display:"flex",gap:6,flex:1,flexWrap:"wrap"}},
          entry.sets.map(function(s,i){return(s.weight||s.reps)?h("span",{key:i,style:{fontSize:10,color:s.done?"#6b7280":"#4b5563",fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap"}},(s.weight||"—")+"×"+(s.reps||"—")):null}).filter(Boolean)));
    }));

/* ── Session Completion Summary ── */
function calcSessionStats(day){
  var saved=loadDayData(day.id);
  var totalVolume=0,totalSets=0,prs=[],rpeValues=[];
  day.exercises.forEach(function(ex){
    var sets=saved.exercises&&saved.exercises[ex.id];
    if(!sets)return;
    sets.forEach(function(s){
      if(s.done&&s.weight&&s.reps){
        totalVolume+=parseFloat(s.weight)*parseInt(s.reps);
        totalSets++;
      }
    });
    /* RPE */
    if(saved.rpe&&saved.rpe[ex.id])rpeValues.push(saved.rpe[ex.id]);
    /* Check for PR */
    var maxWeight=0;
    if(sets)sets.forEach(function(s){if(s.done&&s.weight){var w=parseFloat(s.weight);if(w>maxWeight)maxWeight=w}});
    if(maxWeight>0){
      var hist=getHistory(day.id,ex.id,10);
      var histMax=0;
      hist.forEach(function(h){h.sets.forEach(function(s){if(s.done&&s.weight){var w=parseFloat(s.weight);if(w>histMax)histMax=w}})});
      if(maxWeight>histMax&&histMax>0)prs.push({name:ex.name,weight:maxWeight,prev:histMax});
    }
  });
  var duration=getSessionStart()?Math.floor((Date.now()-getSessionStart())/1000):0;
  var avgRpe=rpeValues.length>0?rpeValues.reduce(function(a,b){return a+b},0)/rpeValues.length:null;
  var cardio=lsGet("cardio_"+day.id+"_"+today());
  return{totalVolume:totalVolume,totalSets:totalSets,prs:prs,duration:duration,avgRpe:avgRpe,cardio:cardio&&cardio.done};
}

/* ── Day View ── */
function DayView(props){
  var day=props.day,refresh=props.refresh;
  var s5=useState(false),showComplete=s5[0],setShowComplete=s5[1];
  var s6=useState(false),dismissed=s6[0],setDismissed=s6[1];
  var saved=loadDayData(day.id);
  var totalSets=day.exercises.reduce(function(a,e){return a+e.sets},0);
  var doneSets=day.exercises.reduce(function(a,e){var d=saved.exercises&&saved.exercises[e.id];return a+(d?d.filter(function(s){return s.done}).length:0)},0);
  var pct=totalSets>0?doneSets/totalSets:0;

/* ── Session Timer ── */
function SessionTimer(){
  var s=useState(0),elapsed=s[0],setElapsed=s[1];
  var started=getSessionStart();
  useEffect(function(){
    if(!started)return;
    var tick=function(){setElapsed(Math.floor((Date.now()-started)/1000))};tick();
    var id=setInterval(tick,1000);return function(){clearInterval(id)};
  },[started]);
  if(!started)return h("span",{style:{fontSize:11,color:"#3f3f46"}},"Not started");
  return h("span",{style:{fontSize:12,fontWeight:700,color:"#f59e0b",fontVariantNumeric:"tabular-nums"}},fmtElapsed(elapsed));
}
