/* ═══ Minimal test harness ═══ */
var results=[],passed=0,failed=0;
function assert(name,condition,detail){
  if(condition){passed++;results.push('<div class="pass">\u2713 '+name+'</div>')}
  else{failed++;results.push('<div class="fail">\u2717 '+name+(detail?' \u2014 '+detail:'')+'</div>')}
}
function suite(name){results.push('<div class="suite">'+name+'</div>')}
function deepEqual(a,b){return JSON.stringify(a)===JSON.stringify(b)}

/* ═══ Functions under test (copied from app.js to avoid module issues) ═══ */

var today=function(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")};

function parseRepRange(reps){var str=String(reps).replace(/\/leg/i,"");var parts=str.split("-");if(parts.length===2)return{min:parseInt(parts[0])||0,max:parseInt(parts[1])||0};var n=parseInt(str)||0;return{min:n,max:n}}

function calc1RM(weight,reps){var w=parseFloat(weight),r=parseInt(reps);if(!w||!r||r<=0)return 0;if(r===1)return w;var capped=Math.min(r,10);return Math.round(w*(1+capped/30))}

function validateImportData(data){
  if(!data||typeof data!=="object"||Array.isArray(data))return"Import file must be a JSON object.";
  var keys=Object.keys(data);if(keys.length===0)return"Import file is empty.";
  for(var i=0;i<keys.length;i++){if(keys[i]==="_export_meta")continue;if(!keys[i].startsWith("ht_"))return"Unexpected key '"+keys[i]+"' \u2014 not a valid export."}
  return null;
}

var PLATES_LBS=[45,35,25,10,5,2.5];
var PLATES_KG=[25,20,15,10,5,2.5,1.25];
var BAR_LBS=45,BAR_KG=20;

function calcPlates(totalWeight,unit,barOverride){
  var bar=barOverride>0?barOverride:(unit==="kg"?BAR_KG:BAR_LBS);
  if(totalWeight<=bar)return{bar:bar,plates:[],remainder:0,barOnly:true};
  var plates=unit==="kg"?PLATES_KG:PLATES_LBS;
  var perSide=(totalWeight-bar)/2;var result=[];var rem=perSide;
  plates.forEach(function(p){while(rem>=p-0.001){result.push(p);rem-=p}});
  return{bar:bar,plates:result,remainder:Math.round(rem*100)/100,barOnly:false};
}

var _testStore={};
function lsGet(k){var v=_testStore[k];return v===undefined?null:JSON.parse(JSON.stringify(v))}
function lsSet(k,v){_testStore[k]=JSON.parse(JSON.stringify(v))}

function validateConfig(cfg){
  if(!cfg||typeof cfg!=="object")return"Config must be a JSON object";
  if(!cfg.profile||typeof cfg.profile!=="string")return"Missing 'profile' field";
  if(!cfg.name||typeof cfg.name!=="string")return"Missing 'name' field";
  if(!Array.isArray(cfg.days))return"'days' must be an array";
  var ids={};
  for(var i=0;i<cfg.days.length;i++){
    var day=cfg.days[i];
    if(!day.id)return"Day "+(i+1)+" missing 'id'";
    if(!day.title&&!day.label)return"Day '"+day.id+"' missing 'title' or 'label'";
    if(!Array.isArray(day.exercises))return"Day '"+day.id+"' missing 'exercises' array";
    for(var j=0;j<day.exercises.length;j++){
      var ex=day.exercises[j];
      if(!ex.id)return"Exercise "+(j+1)+" in '"+day.id+"' missing 'id'";
      if(!ex.name)return"Exercise '"+ex.id+"' missing 'name'";
      if(ids[ex.id])return"Duplicate exercise id '"+ex.id+"' (first in '"+ids[ex.id]+"')";
      ids[ex.id]=day.id;
      if(!ex.sets||!ex.reps)return"Exercise '"+ex.id+"' missing 'sets' or 'reps'";
    }
  }
  return null;
}

var TREND_RANGES={4:28,8:56,12:84,0:9999};

function getDefaultCompoundLifts(config){
  var scored=[];
  config.days.forEach(function(day){
    day.exercises.forEach(function(ex){
      var range=parseRepRange(ex.reps);
      var score=(ex.muscles||[]).length*10+(20-range.max);
      scored.push({id:ex.id,name:ex.name,dayId:day.id,score:score});
    });
  });
  scored.sort(function(a,b){return b.score-a.score});
  var seen={};var result=[];
  scored.forEach(function(s){
    if(!seen[s.name]&&result.length<4){
      seen[s.name]=true;
      result.push({id:s.id,name:s.name,dayId:s.dayId});
    }
  });
  return result;
}

function calc7DayAverage(points){
  if(points.length<2)return[];
  return points.map(function(p,i){
    var start=Math.max(0,i-6);
    var slice=points.slice(start,i+1);
    var sum=0;slice.forEach(function(s){sum+=s.weight});
    return{date:p.date,avg:parseFloat((sum/slice.length).toFixed(1))};
  });
}

var MAX_MESO_HISTORY=20;
function getMesoHistory(){return lsGet("meso_history")||[]}
function saveMesoSnapshot(snapshot){
  var hist=getMesoHistory();
  hist.unshift(snapshot);
  if(hist.length>MAX_MESO_HISTORY)hist=hist.slice(0,MAX_MESO_HISTORY);
  lsSet("meso_history",hist);
}

function fmtTime(s){return Math.floor(s/60)+":"+String(s%60).padStart(2,"0")}
function fmtElapsed(s){var hr=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return hr>0?hr+"h "+m+"m":m>0?m+"m "+String(sec).padStart(2,"0")+"s":sec+"s"}

function getOverloadSuggestion(exercise,lastSets,prevSets){
  var range=parseRepRange(exercise.reps);if(range.max===0)return null;
  var comp=lastSets.filter(function(s){return s.done&&s.weight&&s.reps});
  if(comp.length<Math.max(1,Math.floor(exercise.sets*0.8)))return null;
  var allTop=comp.every(function(s){return parseInt(s.reps)>=range.max});
  var lw=0;comp.forEach(function(s){var w=parseFloat(s.weight)||0;if(w>lw)lw=w});if(lw===0)return null;
  var inc=exercise.increment||(exercise.machine?2.5:5);
  var repsFirst=(inc<=2.5&&range.max>=12)||range.max>=15;
  if(!allTop)return null;
  if(repsFirst&&prevSets){
    var prevComp=prevSets.filter(function(s){return s.done&&s.weight&&s.reps});
    var prevAlsoTop=prevComp.length>0&&prevComp.every(function(s){return parseInt(s.reps)>=range.max});
    if(!prevAlsoTop){
      var targetReps=Math.min(range.max+2,30);
      return{type:"reps",from:lw,to:lw,targetReps:targetReps};
    }
  }
  return{type:"weight",from:lw,to:lw+inc,increment:inc};
}

suite("Progressive Overload Logic");
(function(){
  var exercise={id:"t1",name:"Test",sets:3,reps:"8-10",rest:90,machine:false,increment:5,muscles:["chest"]};

  /* Not all sets at top of range — no suggestion */
  var lastSets=[{weight:"185",reps:"8",done:true},{weight:"185",reps:"9",done:true},{weight:"185",reps:"9",done:true}];
  assert("Not at top of range = null",getOverloadSuggestion(exercise,lastSets,null)===null);

  /* All at top of range, no prev data — suggest reps first (inc=5, not <=2.5, max=10 not >=15) */
  lastSets=[{weight:"185",reps:"10",done:true},{weight:"185",reps:"10",done:true},{weight:"185",reps:"10",done:true}];
  var r=getOverloadSuggestion(exercise,lastSets,null);
  assert("All at top, inc=5 => suggest weight",r!==null&&r.type==="weight","got "+JSON.stringify(r));

  /* Reps-first path: small increment */
  var exSmallInc={id:"t2",name:"Lat Raise",sets:3,reps:"12-15",rest:60,machine:false,increment:2.5,muscles:["side_delt"]};
  lastSets=[{weight:"20",reps:"15",done:true},{weight:"20",reps:"15",done:true},{weight:"20",reps:"15",done:true}];
  var prevSets=[{weight:"20",reps:"13",done:true},{weight:"20",reps:"14",done:true},{weight:"20",reps:"13",done:true}];
  r=getOverloadSuggestion(exSmallInc,lastSets,prevSets);
  assert("Small inc + prev not at top => reps first",r!==null&&r.type==="reps","got "+JSON.stringify(r));

  /* Reps-first path: both sessions at top => weight up */
  prevSets=[{weight:"20",reps:"15",done:true},{weight:"20",reps:"15",done:true},{weight:"20",reps:"15",done:true}];
  r=getOverloadSuggestion(exSmallInc,lastSets,prevSets);
  assert("Both sessions at top => weight up",r!==null&&r.type==="weight","got "+JSON.stringify(r));

  /* Not enough completed sets */
  lastSets=[{weight:"185",reps:"10",done:true},{weight:"185",reps:"10",done:true}];
  r=getOverloadSuggestion(exercise,lastSets,null);
  assert("Not enough sets = null",r===null);

  /* Zero weight */
  lastSets=[{weight:"0",reps:"10",done:true},{weight:"0",reps:"10",done:true},{weight:"0",reps:"10",done:true}];
  r=getOverloadSuggestion(exercise,lastSets,null);
  assert("Zero weight = null",r===null);

  /* High rep range (>=15) triggers reps-first */
  var exHighRep={id:"t3",name:"Calf Raise",sets:4,reps:"15-20",rest:45,machine:true,muscles:["calves"]};
  lastSets=[{weight:"90",reps:"20",done:true},{weight:"90",reps:"20",done:true},{weight:"90",reps:"20",done:true},{weight:"90",reps:"20",done:true}];
  prevSets=[{weight:"90",reps:"18",done:true},{weight:"90",reps:"17",done:true},{weight:"90",reps:"19",done:true},{weight:"90",reps:"18",done:true}];
  r=getOverloadSuggestion(exHighRep,lastSets,prevSets);
  assert("High rep range + prev not topped => reps",r!==null&&r.type==="reps","got "+JSON.stringify(r));
})();

suite("Unit Conversion (kg↔lbs)");
(function(){
  /* lbs to kg: Math.round(w/2.20462*2)/2 */
  function lbsToKg(w){return Math.round(w/2.20462*2)/2}
  /* kg to lbs: Math.round(w*2.20462/5)*5 */
  function kgToLbs(w){return Math.round(w*2.20462/5)*5}

  /* Verify conversion functions produce reasonable values */
  assert("135 lbs → ~61 kg",lbsToKg(135)>=60.5&&lbsToKg(135)<=61.5);
  assert("225 lbs → ~102 kg",lbsToKg(225)>=101&&lbsToKg(225)<=103);
  assert("45 lbs → ~20 kg",lbsToKg(45)>=20&&lbsToKg(45)<=21);
  assert("60 kg → ~132 lbs",kgToLbs(60)>=130&&kgToLbs(60)<=135);
  assert("100 kg → ~220 lbs",kgToLbs(100)>=220&&kgToLbs(100)<=225);
  assert("20 kg → ~44 lbs",kgToLbs(20)>=40&&kgToLbs(20)<=45);
  /* Conversions round to nearest 0.5kg and 5lbs respectively */
  assert("lbs→kg rounds to 0.5",lbsToKg(135)%0.5===0);
  assert("kg→lbs rounds to 5",kgToLbs(60)%5===0);
})();

suite("getRIRTrend — declining detection");
(function(){
  /* Simulate getRIRTrend logic (copied from app.js) */
  function getRIRTrendTest(sessionAvgs){
    if(sessionAvgs.length<2)return null;
    var overall=sessionAvgs.reduce(function(a,b){return a+b},0)/sessionAvgs.length;
    var declining=sessionAvgs.length>=2&&sessionAvgs[0]<sessionAvgs[sessionAvgs.length-1]-0.5;
    return{avg:overall,declining:declining,sessions:sessionAvgs};
  }
  /* sessionAvgs[0] = most recent, sessionAvgs[last] = oldest (getHistory returns most-recent-first) */
  /* Declining: most recent RIR is lower than oldest (fatigue accumulating) */
  var declining=getRIRTrendTest([1.0, 2.0, 3.0]);/* Recent=1, Oldest=3 — RIR declining */
  assert("RIR 3→2→1 is declining",declining.declining===true,"got "+declining.declining);

  var improving=getRIRTrendTest([3.0, 2.0, 1.0]);/* Recent=3, Oldest=1 — RIR improving */
  assert("RIR 1→2→3 is NOT declining",improving.declining===false,"got "+improving.declining);

  var stable=getRIRTrendTest([2.0, 2.0, 2.0]);/* No change */
  assert("RIR 2→2→2 is NOT declining",stable.declining===false);

  var marginal=getRIRTrendTest([2.0, 2.0, 2.3]);/* Only 0.3 diff — below 0.5 threshold */
  assert("RIR diff < 0.5 is NOT declining",marginal.declining===false);

  var single=getRIRTrendTest([2.0]);
  assert("Single session returns null",single===null);
})();

suite("getMesoRepTarget — undulating periodization");
(function(){
  var MESO_REP_SHIFT={1:0,2:-1,3:-2,4:4};
  function getMesoRepTargetTest(baseReps,week){
    var range=parseRepRange(baseReps);var shift=MESO_REP_SHIFT[week]||0;
    if(week===4){return{min:Math.max(1,range.min+2),max:range.max+4,label:"Deload"}}
    var newMin=Math.max(1,range.min+shift);var newMax=Math.max(newMin,range.max+shift);
    if(shift===0)return null;
    return{min:newMin,max:newMax,label:"Wk"+week};
  }
  assert("Week 1 returns null (no shift)",getMesoRepTargetTest("8-10",1)===null);
  var wk2=getMesoRepTargetTest("8-10",2);
  assert("Week 2: 8-10 → 7-9",wk2.min===7&&wk2.max===9,"got "+wk2.min+"-"+wk2.max);
  var wk3=getMesoRepTargetTest("8-10",3);
  assert("Week 3: 8-10 → 6-8",wk3.min===6&&wk3.max===8,"got "+wk3.min+"-"+wk3.max);
  var wk4=getMesoRepTargetTest("8-10",4);
  assert("Week 4 (deload): 8-10 → 10-14",wk4.min===10&&wk4.max===14,"got "+wk4.min+"-"+wk4.max);
  var lowRange=getMesoRepTargetTest("3-5",3);
  assert("Week 3: 3-5 → min clamped to 1",lowRange.min===1,"got "+lowRange.min);
})();

suite("History index key parsing");
(function(){
  function parseHistoryKey(key,prefix){
    if(!key||key.indexOf(prefix)!==0)return null;
    var rest=key.slice(prefix.length);var atIdx=rest.indexOf("@");if(atIdx===-1)return null;
    var dayId=rest.slice(0,atIdx);var date=rest.slice(atIdx+1);
    if(!date||date.length!==10)return null;
    return{dayId:dayId,date:date};
  }

suite("Bilateral volume counting");
(function(){
  function countBilateralDone(ex,saved){
    if(!ex.bilateral){
      var sets=saved.exercises&&saved.exercises[ex.id]||[];
      return Math.min(sets.filter(function(s){return s.done}).length,ex.sets);
    }
    var lSets=saved.exercises&&saved.exercises[ex.id+"_L"]||[];
    var rSets=saved.exercises&&saved.exercises[ex.id+"_R"]||[];
    var lCount=lSets.filter(function(s){return s.done}).length;
    var rCount=rSets.filter(function(s){return s.done}).length;
    return Math.min(lCount,ex.sets)+Math.min(rCount,ex.sets);
  }
  var ex={id:"bss",bilateral:true,sets:3};
  var saved={exercises:{"bss_L":[{done:true},{done:true},{done:true}],"bss_R":[{done:true},{done:true},{done:true}]}};
  assert("Bilateral 3L+3R = 6 (3 per side)",countBilateralDone(ex,saved)===6);
  saved={exercises:{"bss_L":[{done:true},{done:true}],"bss_R":[{done:true},{done:true},{done:true}]}};
  assert("Bilateral 2L+3R = 5 (min-capped per side)",countBilateralDone(ex,saved)===5);
  saved={exercises:{}};
  assert("Bilateral no data = 0",countBilateralDone(ex,saved)===0);
})();

(function(){
  var ex={id:"t7",name:"Test",sets:4,reps:"8-10",rest:90,machine:false,increment:5,muscles:["chest"]};

suite("Unit conversion round-trip");
(function(){
  function lbsToKg(w){return Math.round(w/2.20462*2)/2}
  function kgToLbs(w){return Math.round(w*2.20462/5)*5}
  /* Round-trip: original lbs → kg → lbs should be within 5lbs tolerance */
  var originals=[135,185,225,315,405,45,50,67.5];
  originals.forEach(function(lbs){
    var kg=lbsToKg(lbs);
    var backToLbs=kgToLbs(kg);
    assert(lbs+" lbs round-trip (→"+kg+"kg→"+backToLbs+"lbs)",Math.abs(backToLbs-lbs)<=5,"delta="+Math.abs(backToLbs-lbs));
  });
})();

suite("Session date locking");
(function(){

  function lockDate(){if(!_lock)_lock="2026-03-04"}
  function unlockDate(){_lock=null}
  function getSessionDate(){return _lock||"2026-03-05"}

  assert("Before lock: returns today","2026-03-05"===getSessionDate());
  lockDate();
  assert("After lock: returns lock date","2026-03-04"===getSessionDate());

suite("Rest time drift detection");
(function(){
  /* Simulate drift detection logic from HistoryPanel restAnalysis */
  function detectDrift(rests){
    if(rests.length<2)return null;
    var overall=Math.round(rests.reduce(function(a,r){return a+r},0)/rests.length);
    var recent=rests[0],oldest=rests[rests.length-1];
    var drift=recent-oldest;
    return{overall:overall,drift:drift,drifting:Math.abs(drift)>15};
  }
  var stable=detectDrift([90,92,88,91]);
  assert("Stable rests: not drifting",stable.drifting===false);
  var increasing=detectDrift([120,105,95,90]);
  assert("Increasing rests: drifting",increasing.drifting===true);
  assert("Increasing rests: positive drift",increasing.drift>0);
  var decreasing=detectDrift([70,80,90,100]);
  assert("Decreasing rests: drifting",decreasing.drifting===true);
  assert("Decreasing rests: negative drift",decreasing.drift<0);
  var single=detectDrift([90]);
  assert("Single session: null",single===null);
})();
